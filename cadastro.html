<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css_pages/main.css">
    <title>Coração Seguro - Cadastro</title>
</head>
<body class="body-cadastro">
    <div class="bem-vindo">
        <h1>Bem Vindo</h1>
        <p>Envie as informações abaixo para fazer<br> o cadastro no nosso site ou faça seu login.</p>
        <a href="./index.html">Entrar</a>
    </div>
    <main class="main-cadastro">
        <div class="container-geral-cadastro">

            <div class="container-form-cadastro">
                <form class="forms-cadastro" action="">
                    <div class="titulo">
                        <h1>Cadastre-se</h1>
                    </div>

                    <div class="container-label">
                        <input type="text" id="nome" placeholder="Nome Completo:">
                    </div>

                    <div class="container-label">
                        <input type="email" id="email" placeholder="Email:">
                    </div>

                    <div class="container-label">
                        <input type="password" id="senha" placeholder="Senha">
                    </div>

                    <div class="container-label">
                        <input type="text" id="telefone" placeholder="Telefone:">
                    </div>

                    <div class="form-group">
                        <p>Sexo:</p>
                        <div class="checkbox-group">
                            <label for="masculino">
                                <input type="radio" id="masculino" name="sexo" value="masculino">
                                <span>Masculino</span>
                            </label>
                            <label for="feminino">
                                <input type="radio" id="feminino" name="sexo" value="feminino">
                                <span>Feminino</span>
                            </label>
                            <label for="outro">
                                <input type="radio" id="outro" name="sexo" value="outro">
                                <span>Outro</span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="date-group">
                            <label for="data-nascimento" id="data-n">Data de Nascimento:</label>
                            <input type="date" id="data-nascimento" name="data-nascimento">
                        </div>
                    </div>

                    <div class="container-label-2">
                        <input type="text" id="cidade" placeholder="CEP:">
                    </div>

                    <div class="container-label">
                        <input type="password" id="estado" placeholder="Série do marcapasso (UID):">
                    </div>

                    <div class="container-label">
                        <input type="password" id="endereco" placeholder="Modelo do marcapasso:">
                    </div>

                    <a href="./index.html" class="enviar">Enviar</a>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
