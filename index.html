<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css_pages/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Coração Seguro - Login</title>
</head>
<body class="login-page">
    <!-- Conteúdo principal do site -->
    <main class="principal-login">
        <div class="logomarca-titulo-login" id="logo-Principal">
            <i class="bi bi-heart-pulse"></i>
            <h3>Coração Seguro</h3>
        </div>
        <!-- Formulário de login -->
        <form class="forms-login" action="">
            <div class="titulo">
                <h1>Login</h1>
            </div>

            <div class="container-label">
                <label for="email">Digite seu e-mail:</label>
                <input type="email" id="email">
            </div>

            <label for="senha" class="digite-senha">Digite sua senha:</label>
            <div class="container-label-2">
                <input type="password" id="senha">
            </div>

            <div class="container-label">
                <label for="number">Série do Marca-passos:</label>
                <input type="senha" id="senha">
            </div>

            <p class="esqueceu-senha">Esqueceu sua senha? 
                <a href="#">Clique aqui!</a>
            </p>

            <a class="entrar" href="./homePage.html">Entrar</a>

            <a href="./cadastro.html" class="create-account">Criar conta</a>

            <p>Ou</p>

            <div class="redes-sociais">
                <a href="https://www.facebook.com"><img src="./assets/img/facebook-50.png" alt="Facebook logo"></a>
                <a href="https://mail.google.com"><img src="./assets/img/gmail-50.png" alt="Instagram logo"></a>
                <a href="https://x.com"><img src="./assets/img/twitter-50.png" alt="Twitter logo"></a>
            </div>
        </form>
    </main>
    <script type="module" src="./assets/js_pages/main.js"></script>
</body>
</html>
